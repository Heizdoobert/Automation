[mypy]
python_version = 3.10
ignore_missing_imports = True
no_strict_optional = True
warn_return_any = True
warn_unused_ignores = False

# pixonwrapper uses "from airtest import *" so logwrap, G, Template etc
# are undefined at static analysis time — disable name-defined for this file
[mypy-pixon.pixonwrapper]
disable_error_code = name-defined

# game_page imports G from pixonwrapper which mypy cannot resolve
[mypy-pages.game_page]
disable_error_code = attr-defined